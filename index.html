<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>출퇴근 기록기</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style type="text/tailwindcss">
      @theme {
        --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
        --font-serif: "Playfair Display", serif;
        --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;
      }

      @layer base {
        body {
          @apply antialiased bg-[#F5F5F0] text-[#141414] font-sans;
        }
      }

      .font-serif { font-family: var(--font-serif); }
      .font-mono { font-family: var(--font-mono); }
      
      /* Mobile touch target optimization */
      button {
        @apply touch-manipulation;
      }
      
      /* Smooth transitions for view changes */
      #app {
        transition: opacity 0.2s ease-in-out;
      }
    </style>

<style>
  .delete-emp-btn svg {
    pointer-events: none;
  }
</style>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=JetBrains+Mono:wght@400;700&display=swap">
  </head>
  <body>
    <div id="root">
      <div class="min-h-screen pb-24 md:pt-24">
        <!-- Navigation -->
        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-[#141414]/10 px-6 py-4 z-50 flex justify-around items-center md:top-0 md:bottom-auto md:border-t-0 md:border-b">
          <button data-view="daily" class="flex flex-col items-center gap-1 transition-colors opacity-50 hover:opacity-100">
            <i data-lucide="calendar"></i>
            <span class="text-[10px] font-bold uppercase tracking-wider">일일 기록</span>
          </button>
          <button data-view="stats" class="flex flex-col items-center gap-1 transition-colors opacity-50 hover:opacity-100">
            <i data-lucide="bar-chart-3"></i>
            <span class="text-[10px] font-bold uppercase tracking-wider">월별 통계</span>
          </button>
          <button data-view="calendar" class="flex flex-col items-center gap-1 transition-colors opacity-50 hover:opacity-100">
            <i data-lucide="calendar-days"></i>
            <span class="text-[10px] font-bold uppercase tracking-wider">한달 보기</span>
          </button>
          <button data-view="employees" class="flex flex-col items-center gap-1 transition-colors opacity-50 hover:opacity-100">
            <i data-lucide="users"></i>
            <span class="text-[10px] font-bold uppercase tracking-wider">직원 관리</span>
          </button>
        </nav>

        <main id="app" class="max-w-2xl mx-auto px-6 pt-8"></main>
      </div>
    </div>
    <script src="/src/app.js?v=12"></script>
  </body>
</html>
